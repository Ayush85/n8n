services:
  # ================================================
  # Backend API
  # ================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: n8n-api
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-n8n_data}
      - DB_USER=${DB_USER:-n8n}
      - DB_PASSWORD=${DB_PASSWORD:-n8n_password}
      - API_PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - N8N_WEBHOOK_URL=https://n8n.aydexis.com/webhook/b5ecaafa-5b1f-483f-b03e-4275a31bdb0a/chat
      - NODE_ENV=production
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatbot-network

  # ================================================
  # Admin Dashboard
  # ================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: n8n-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatbot-network

# ================================================
# Volumes
# ================================================
volumes:
  postgres_data:
    driver: local

# ================================================
# Networks
# ================================================
networks:
  chatbot-network:
    driver: bridge
