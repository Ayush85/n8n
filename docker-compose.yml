services:
  # ================================================
  # n8n Workflow Automation
  # ================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.97.1
    container_name: n8n-app
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-n8n_data}
      - DB_POSTGRESDB_HOST=${DB_HOST:-db}
      - DB_POSTGRESDB_PORT=${DB_PORT:-5432}
      - DB_POSTGRESDB_USER=${DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-n8n_password}
      - DB_POSTGRESDB_SSL=true
      - N8N_DB_POSTGRESDB_SSL=true
      - N8N_DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin_password}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kathmandu
      - N8N_LOG_LEVEL=info
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatbot-network

  # ================================================
  # Backend API
  # ================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: n8n-api
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-n8n_data}
      - DB_USER=${DB_USER:-n8n}
      - DB_PASSWORD=${DB_PASSWORD:-n8n_password}
      - API_PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatbot-network

  # ================================================
  # Admin Dashboard
  # ================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: n8n-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatbot-network

# ================================================
# Volumes
# ================================================
volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local

# ================================================
# Networks
# ================================================
networks:
  chatbot-network:
    driver: bridge
